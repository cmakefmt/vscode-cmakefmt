name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Bump this to pick up a new cmakefmt release.
env:
  CMAKEFMT_VERSION: "1.4.0"

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package (${{ matrix.vscode_target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin-arm64: aarch64-apple-darwin ✅
          - vscode_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            os: macos-latest
          # darwin-x64: x86_64-apple-darwin ✅
          - vscode_target: darwin-x64
            rust_target: x86_64-apple-darwin
            os: macos-latest
          # linux-arm64: aarch64-unknown-linux-gnu ✅
          - vscode_target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # linux-x64: x86_64-unknown-linux-gnu ✅
          - vscode_target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # win32-x64: x86_64-pc-windows-msvc ✅
          - vscode_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
            os: windows-latest
          # NOT included (blocked: needs upstream cmakefmt releases):
          #   win32-arm64  → aarch64-pc-windows-msvc
          #   linux-armhf  → armv7-unknown-linux-gnueabihf
          #   alpine-x64   → x86_64-unknown-linux-musl
          #   alpine-arm64 → aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Assumes the .tar.gz archive contains the binary at the archive root
      # (standard cargo dist convention). Adjust if the upstream layout changes.
      - name: Download and extract cmakefmt binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p bin
          url="https://github.com/cmakefmt/cmakefmt/releases/download/v${{ env.CMAKEFMT_VERSION }}/cmakefmt-${{ env.CMAKEFMT_VERSION }}-${{ matrix.rust_target }}.tar.gz"
          curl -fsSL -o cmakefmt-archive.tar.gz "${url}"
          tar -xzf cmakefmt-archive.tar.gz cmakefmt
          chmod +x cmakefmt
          mv cmakefmt "bin/cmakefmt-${{ matrix.vscode_target }}"

      - name: Download and extract cmakefmt binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $url = "https://github.com/cmakefmt/cmakefmt/releases/download/v${{ env.CMAKEFMT_VERSION }}/cmakefmt-${{ env.CMAKEFMT_VERSION }}-${{ matrix.rust_target }}.zip"
          Invoke-WebRequest -Uri $url -OutFile cmakefmt-archive.zip
          Expand-Archive -Path cmakefmt-archive.zip -DestinationPath .
          Move-Item -Path cmakefmt.exe -Destination "bin\cmakefmt-${{ matrix.vscode_target }}.exe"

      - name: Package extension (.vsix)
        run: npx vsce package --target ${{ matrix.vscode_target }} -o "vscode-cmakefmt-${{ matrix.vscode_target }}.vsix"

      # Publishing (vsce publish / ovsx publish) is intentionally omitted.
      # This workflow only produces .vsix artifacts for inspection and testing.
      # Add publish steps here once code signing (macOS), Open VSX support,
      # and v2.0.0 versioning are ready.
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4  # TODO: pin to SHA hash (Dependabot will update)
        with:
          name: vscode-cmakefmt-${{ matrix.vscode_target }}
          path: vscode-cmakefmt-${{ matrix.vscode_target }}.vsix
          if-no-files-found: error
